name: Build Android APK with NDK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 cmake;3.22.1 ndk;27.0.12077973"

      - name: Verify gradle wrapper
        run: |
          echo "=== ls gradle/wrapper ==="
          ls -la gradle/wrapper/
          echo "=== jar file type ==="
          file gradle/wrapper/gradle-wrapper.jar || echo "JAR NOT FOUND"
          echo "=== jar test ==="
          jar tf gradle/wrapper/gradle-wrapper.jar 2>&1 | head -5 || echo "INVALID JAR"

      - name: Build APK
        run: java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
